name = "cifras-capela"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# O Worker serve os assets estáticos do build do frontend (SPA) e adiciona
# rotas próprias (sitemap.xml, headers). Quando quiser uma API, basta
# adicionar rotas em src/index.ts sob /api/*.
[assets]
directory = "../frontend/dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

# Importa os prompts .md como string (ver src/prompts/*.md).
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[observability]
enabled = true
